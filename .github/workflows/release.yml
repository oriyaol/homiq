name: Release + Docker Publish
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ vars.IMAGE_NAME || github.event.repository.name }}
      REGISTRY: docker.io
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm' }

      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run lint --if-present
      - run: npm test -- --run
      - run: npm run build

      - name: Get previous tag
        id: prev
        run: |
          set -e
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          else
            echo "tag=v0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Determine next version (SemVer from conventional commits)
        id: version
        run: |
          set -e
          PREV="${{ steps.prev.outputs.tag }}"
          COMMITS=$(git log --pretty=format:%s%n%b "${PREV}"..HEAD || true)

          BUMP="none"
          echo "$COMMITS" | grep -E 'BREAKING CHANGE|!:' >/dev/null 2>&1 && BUMP="major"
          [ "$BUMP" = "none" ] && echo "$COMMITS" | grep -E '^feat(\(.*\))?:' >/dev/null 2>&1 && BUMP="minor"
          [ "$BUMP" = "none" ] && echo "$COMMITS" | grep -E '^fix(\(.*\))?:' >/dev/null 2>&1 && BUMP="patch"

          if [ "$BUMP" = "none" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CUR="${PREV#v}"
          MAJOR=$(echo "$CUR" | cut -d. -f1)
          MINOR=$(echo "$CUR" | cut -d. -f2)
          PATCH=$(echo "$CUR" | cut -d. -f3)

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR+1)); PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=v$NEXT" >> $GITHUB_OUTPUT

      - name: Stop if no release required
        if: steps.version.outputs.should_release != 'true'
        run: echo "No release needed. Skipping."

      - name: Create and push git tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          set -e
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "release: ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate release notes
        if: steps.version.outputs.should_release == 'true'
        id: notes
        run: |
          PREV="${{ steps.prev.outputs.tag }}"
          NOW="${{ steps.version.outputs.tag }}"
          BODY=$(git log --pretty=format:"- %s" "${PREV}..HEAD" || echo "- Initial release")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes in ${NOW}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Built from commit: $GITHUB_SHA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}

      - name: Set up Docker Buildx
        if: steps.version.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.version.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build & Push Docker image
        if: steps.version.outputs.should_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME || github.event.repository.name }}:${{ steps.version.outputs.tag }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME || github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

